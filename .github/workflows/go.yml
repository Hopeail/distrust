name: Build Distrust

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    name: Build for Linux
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 同时编译 amd64 和 arm64 (用于树莓派或甲骨文 ARM 云)
        goarch: [amd64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21' # 建议使用稳定版
          cache: true        # 自动缓存依赖，加快后续编译速度

      - name: Build Binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} \
          go build -v -o distrust-linux-${{ matrix.goarch }} .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: distrust-linux-${{ matrix.goarch }}
          path: distrust-linux-${{ matrix.goarch }}
